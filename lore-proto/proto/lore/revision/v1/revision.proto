syntax = "proto3";

package lore.revision.v1;

import "lore/model/v1/model.proto";

// Baseline revision-graph service. Carries the minimal, stable set of
// graph primitives — branch lifecycle, metadata CAS, revision listing.
// Presentation helpers (describe / tree / diff) live separately on
// lore.thin_client.v1.ThinClientService.
service RevisionService {
  // Create a new branch as a fork of an existing revision chain.
  rpc BranchCreate     (BranchCreateRequest)      returns (BranchCreateResponse);
  // Tombstone a live branch by id. Idempotent on already-tombstoned
  // branches.
  rpc BranchDelete     (BranchDeleteRequest)      returns (BranchDeleteResponse);
  // Look up a branch by id (live or tombstoned) or by name (live only).
  rpc BranchGet        (BranchGetRequest)         returns (BranchGetResponse);
  // Stream all branches matching the optional filters.
  rpc BranchList       (BranchListRequest)        returns (stream BranchListResponse);
  // Set the tip of a branch to a specific revision. Supports force and
  // fast-forward-merge semantics.
  rpc BranchPush       (BranchPushRequest)        returns (BranchPushResponse);
  // Authoritatively merge a pinned source branch tip into a pinned target
  // branch tip, optionally resolving each conflict to the target or source
  // side. The target moves only after the entire merge succeeds.
  rpc BranchMerge      (BranchMergeRequest)       returns (BranchMergeResponse);
  // Cheap hash-only read of a branch's current metadata pointer.
  rpc BranchMetadataGet(BranchMetadataGetRequest) returns (BranchMetadataGetResponse);
  // Compare-and-swap update of a branch's metadata pointer. CAS miss is
  // signalled in-band via the response, never as a non-OK gRPC status.
  rpc BranchMetadataSet(BranchMetadataSetRequest) returns (BranchMetadataSetResponse);
  // Page through a branch's revision history. Server picks page size.
  rpc RevisionList     (RevisionListRequest)      returns (RevisionListResponse);
  // Atomically apply an address-backed path changeset to an observed branch
  // tip. Immutable construction happens first; the same protected BranchPush
  // CAS path used by BranchPush is the visibility point.
  rpc RevisionCreate   (RevisionCreateRequest)    returns (RevisionCreateResponse);
}

// Request to create a new branch. The caller must supply a fully-resolved
// ancestry stack (no `number == 0` tip resolution is performed for
// BranchCreate). The caller also pre-generates the branch `id` so that
// retries are idempotent — a duplicate `id` already in use returns
// ALREADY_EXISTS.
message BranchCreateRequest {
  // Caller-pre-generated branch id (typically a UUIDv7). Re-issuing the
  // same id on retry yields ALREADY_EXISTS rather than creating a
  // duplicate; this gives the RPC end-to-end retry idempotency.
  bytes id = 1;
  // Human-readable name for the new branch. Must not collide with any
  // live branch (tombstoned names are free for reuse).
  string name = 2;
  // Identity to attribute as the branch creator. If unset, the server
  // uses the authenticated JWT identity. If set, the caller must have
  // permission to attribute branches to other identities.
  optional string creator = 3;
  // Free-form caller-defined tag for grouping or filtering. Server
  // stores verbatim; empty string allowed.
  string category = 4;
  // Ancestry chain — parent-first, root-last. stack[0] is the
  // immediate parent the new branch is forked from. Every entry's
  // revision_signature must resolve to a known revision on its
  // branch_id.
  repeated lore.model.v1.BranchPoint stack = 5;
}

// Response containing the newly-created branch record.
message BranchCreateResponse {
  // Full Branch record including server-assigned `created` timestamp
  // and the preserved stack.
  lore.model.v1.Branch branch = 1;
}

// Request to tombstone a live branch by id. Names are not used here
// because they may have been recycled after a prior delete.
message BranchDeleteRequest {
  // Branch id obtained from a prior BranchGet / BranchList.
  bytes id = 1;
}

// Response carrying the post-delete branch record. The record's name
// field is preserved even though the name → id mapping has been
// erased.
message BranchDeleteResponse {
  // Tombstoned branch record (deleted = true).
  lore.model.v1.Branch branch = 1;
}

// Request to look up a branch by id or by name.
message BranchGetRequest {
  // Lookup mode.
  oneof query {
    // Lookup by branch id — returns the branch live or tombstoned.
    bytes id = 1;
    // Lookup by branch name — returns the live branch with that name
    // only. Tombstoned branches are not resolvable by name.
    string name = 2;
  }
}

// Response containing the resolved branch record.
message BranchGetResponse {
  // Branch record matching the lookup.
  lore.model.v1.Branch branch = 1;
}

// Request to stream branches with optional filters.
message BranchListRequest {
  // If set, only branches whose `creator` field is an exact
  // byte-for-byte case-sensitive match are emitted. If unset, no
  // creator filter is applied.
  optional string creator = 1;
  // If true, tombstoned branches are emitted with `Branch.deleted =
  // true`. Default false (only live branches emitted).
  bool include_deleted = 2;
}

// One-per-stream-message response carrying a single branch record.
message BranchListResponse {
  // A branch matching the request's filters.
  lore.model.v1.Branch branch = 1;
}

// Request to push a revision as a branch's new tip.
message BranchPushRequest {
  // Target branch id.
  bytes id = 1;
  // Content signature of the revision to push. Caller must ensure the
  // revision and all data it references are present in CAS before
  // calling.
  bytes revision_signature = 2;
  // When true, the server replaces the tip directly without checking
  // whether the new tip descends from the current one. Wins over
  // `fast_forward_merge` when both are set.
  bool force = 3;
  // When true and the new tip does not descend from the current tip,
  // the server attempts a fast-forward merge. Mutually superseded by
  // `force`.
  bool fast_forward_merge = 4;
}

// Response describing the resulting branch tip after a push.
message BranchPushResponse {
  // Signature of the resulting tip (may equal the request's
  // revision_signature, or a new merge revision in the
  // fast-forward-merge case).
  bytes revision_signature = 1;
  // Per-branch number of the resulting tip.
  uint64 revision_number = 2;
  // True iff the server performed a fast-forward merge to land the
  // push.
  bool fast_forward_merged = 3;
  // Optional human-readable diagnostic. Free-form; clients should not
  // parse it.
  optional string message = 4;
}

// Which complete side of a merge conflict should be retained. Values are
// intentionally prefixed because protobuf enum values share package scope.
enum BranchMergeSide {
  BRANCH_MERGE_SIDE_UNSPECIFIED = 0;
  // Keep the target branch's version of the conflicted path.
  BRANCH_MERGE_SIDE_TARGET = 1;
  // Apply the source branch's version of the conflicted path.
  BRANCH_MERGE_SIDE_SOURCE = 2;
}

// Terminal result of a BranchMerge attempt.
enum BranchMergeOutcome {
  BRANCH_MERGE_OUTCOME_UNSPECIFIED = 0;
  // A two-parent revision was published to the target branch.
  BRANCH_MERGE_OUTCOME_MERGED = 1;
  // The source introduced no changes relative to the resolved base.
  BRANCH_MERGE_OUTCOME_ALREADY_UP_TO_DATE = 2;
  // One or more conflicts still need an explicit resolution.
  BRANCH_MERGE_OUTCOME_CONFLICTED = 3;
}

// Request for an atomic, server-authored branch merge. Both tips are required
// optimistic-concurrency guards; stale tips fail with FAILED_PRECONDITION.
message BranchMergeRequest {
  // Required caller-generated UUIDv7. A successfully published request is
  // idempotent; reusing its id with different content is rejected.
  bytes request_id = 1;
  // Branch that will move when the merge succeeds.
  bytes branch_id_target = 2;
  // Exact target tip observed by the caller.
  bytes revision_signature_target = 3;
  // Branch whose changes will be merged into the target.
  bytes branch_id_source = 4;
  // Exact source tip observed by the caller.
  bytes revision_signature_source = 5;
  // Commit message for the server-authored merge revision.
  string commit_message = 6;
  // Per-conflict decisions keyed by RevisionDiff conflict_id. Missing
  // decisions are returned in-band and cause no branch mutation.
  repeated BranchMergeResolution resolutions = 7;
}

// Resolution for one conflict. The oneof is an extension point for a future
// custom/uploaded-content resolution without changing existing clients.
message BranchMergeResolution {
  // Stable conflict id emitted by RevisionDiff for the same pinned tips.
  bytes conflict_id = 1;
  // Requested resolution strategy.
  oneof resolution {
    // Keep the complete target or source side.
    BranchMergeSide side = 2;
  }
}

// Minimal conflict identity returned by BranchMerge. Clients can obtain full
// content addresses and presentation diffs from RevisionDiff.
message BranchMergeConflict {
  // Stable id accepted by BranchMergeResolution.
  bytes conflict_id = 1;
  // Path changed on the source side.
  string path_source = 2;
  // Path changed on the target side.
  string path_target = 3;
}

// Result of an authoritative merge attempt. CONFLICTED and
// ALREADY_UP_TO_DATE are successful, non-mutating outcomes.
message BranchMergeResponse {
  // Machine-readable outcome.
  BranchMergeOutcome outcome = 1;
  // Published target tip for MERGED, otherwise the pinned target tip.
  bytes revision_signature = 2;
  // Revision number corresponding to revision_signature.
  uint64 revision_number = 3;
  // Common ancestor selected by the server.
  bytes revision_signature_base = 4;
  // Conflicts lacking a supplied decision. Empty for terminal outcomes.
  repeated BranchMergeConflict unresolved_conflicts = 5;
}

// Request for a cheap hash-only read of a branch's metadata pointer.
message BranchMetadataGetRequest {
  // Branch id.
  bytes id = 1;
}

// Response carrying the current metadata hash.
message BranchMetadataGetResponse {
  // Current metadata pointer.
  bytes metadata = 1;
}

// Request for a compare-and-swap update of a branch's metadata pointer.
message BranchMetadataSetRequest {
  // Branch id.
  bytes id = 1;
  // The metadata hash the caller expects to be currently set. The
  // server compares this to the actual current value and only swaps
  // on match.
  bytes expected = 2;
  // The metadata hash to install if the CAS succeeds.
  bytes updated = 3;
}

// Response always returned with gRPC OK regardless of CAS hit or miss.
// On a successful CAS, response.metadata == request.updated. On a CAS
// miss, response.metadata reflects the unchanged prior value; the
// caller compares response.metadata vs request.updated to detect the
// miss and retry.
message BranchMetadataSetResponse {
  // The branch's current metadata pointer after the call.
  bytes metadata = 1;
}

// Request to page through a branch's revision history. The start
// anchor selects which revision the page is anchored at; both forms
// resolve to the same concrete revision and walk that branch's
// history.
message RevisionListRequest {
  // Start anchor for the page.
  oneof start {
    // Identifier-based anchor; `number == 0` resolves to the tip of
    // the branch.
    lore.model.v1.RevisionIdentifier identifier = 1;
    // Signature-based anchor (typically a cursor returned by a
    // previous response).
    bytes signature = 2;
  }
}

// Response carrying a page of revision items (newer-to-older within
// the page) plus optional cursors for the next pages in either
// direction.
message RevisionListResponse {
  // The page of revisions, newest-to-oldest. The revision identified by
  // the request's `start` anchor is guaranteed to appear somewhere in
  // the page, but is not necessarily items[0] — the server may align
  // the page on a wider boundary (e.g. a cached segment) and return
  // items both newer and older than the anchor. Server picks page size.
  repeated lore.model.v1.RevisionItem items = 1;
  // Cursor (signature) to feed back as `start.signature` to fetch
  // the page of revisions newer than this one. Unset when no further
  // newer revisions exist.
  optional bytes signature_forward = 2;
  // Cursor (signature) to feed back as `start.signature` to fetch
  // the page of revisions older than this one. Unset when no further
  // older revisions exist.
  optional bytes signature_backward = 3;
}

// Request to atomically apply a path changeset to a pinned branch tip.
message RevisionCreateRequest {
  // Required caller-generated UUIDv7. Reusing it with identical request bytes
  // returns the original result; reuse with different bytes is rejected.
  bytes request_id = 1;
  bytes branch_id = 2;
  // Exact branch tip observed by the caller. Zero is valid only for an
  // initial/root revision. Stale bases fail with FAILED_PRECONDITION.
  bytes revision_signature_base = 3;
  string commit_message = 4;
  repeated RevisionCreateMetadataEntry metadata = 5;
  repeated RevisionCreateOperation operations = 6;
}

// Caller-supplied metadata entry for a new revision.
message RevisionCreateMetadataEntry {
  string key = 1;
  bytes value = 2;
  // lore metadata type encoding (Address=1, Boolean=2, Context=3, Hash=4,
  // Numeric=5, String=6, Binary=255).
  uint32 format = 3;
}

// One path-level edit in a RevisionCreate changeset.
message RevisionCreateOperation {
  oneof op {
    RevisionCreatePutFile put_file = 1;
    RevisionCreateDirectory create_directory = 2;
    RevisionCreateDeletePath delete_path = 3;
    RevisionCreateMovePath move_path = 4;
  }
}

// Add or replace a file with content previously uploaded to Lore.
message RevisionCreatePutFile {
  string path = 1;
  uint32 mode = 2;
  // UploadContent result. The server verifies the exact repository/context
  // association and derives logical size from immutable fragment metadata.
  lore.model.v1.Address address = 3;
}

// Create an empty directory at a path.
message RevisionCreateDirectory {
  string path = 1;
  uint32 mode = 2;
}

// Delete a file or directory tree at a path.
message RevisionCreateDeletePath { string path = 1; }

// Move or rename a path while preserving its file identity.
message RevisionCreateMovePath {
  string source = 1;
  string destination = 2;
}

// Published revision identity returned by RevisionCreate.
message RevisionCreateResponse {
  bytes revision_signature = 1;
  uint64 revision_number = 2;
}

// A service to receive requests forwarded on from another Lore Sever,
// to perform an RPC on behalf of a client
service ForwardedRevisionService {

  rpc BranchCreate     (BranchCreateRequest)      returns (BranchCreateResponse);
  rpc BranchDelete     (BranchDeleteRequest)      returns (BranchDeleteResponse);
  rpc BranchGet        (BranchGetRequest)         returns (BranchGetResponse);
}
