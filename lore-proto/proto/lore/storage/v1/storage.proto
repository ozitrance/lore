syntax = "proto3";

package lore.storage.v1;

import "lore/model/v1/model.proto";

service StorageService {
    rpc Get(stream lore.model.v1.Address) returns (stream GetResponse);
    // GetMetadata: same wire request as Get (just an Address), but the server's response
    // carries Fragment only — no payload bytes. Used by callers that need fragment metadata
    // (size, flags) for existence/size lookups without paying the payload transfer cost.
    rpc GetMetadata(stream lore.model.v1.Address) returns (stream GetResponse);
    // UploadContent accepts one header followed by raw byte chunks. Lore owns
    // chunking, hashing, compression, fragment-list construction, and durable
    // storage. Cancellation can leave unreachable content-addressed fragments;
    // it never publishes a revision or branch.
    rpc UploadContent(stream UploadContentRequest) returns (UploadContentResponse);
    rpc Put(stream PutRequest) returns (stream PutResponse);
    rpc Query(QueryRequest) returns (QueryResponse);
    rpc PresignDownload(PresignDownloadRequest) returns (PresignDownloadResponse);
    rpc Verify(VerifyRequest) returns (VerifyResponse);
    rpc Copy(stream CopyRequest) returns (stream CopyResponse);
    rpc MutableLoad(MutableLoadRequest) returns (MutableLoadResponse);
    rpc MutableStore(MutableStoreRequest) returns (MutableStoreResponse);
    rpc MutableCompareAndSwap(MutableCompareAndSwapRequest) returns (MutableCompareAndSwapResponse);
}

message GetResponse {
    lore.model.v1.Address address = 1;
    lore.model.v1.Fragment fragment = 2;
    bytes payload = 3;
}

message UploadContentRequest {
    oneof part {
        // Required exactly once as the first stream message.
        UploadContentHeader header = 1;
        // Raw file bytes. Chunks may be any non-empty transport-friendly size;
        // callers must not pre-fragment them according to Lore internals.
        bytes chunk = 2;
    }
}

message UploadContentHeader {
    // UUIDv7 file identity. Use the existing address context when modifying a
    // file. Empty asks Lore to mint a UUIDv7 for a new file.
    bytes file_id = 1;
    // Optional integrity assertion checked against the actual bytes read.
    optional uint64 expected_size = 2;
    // Required caller-generated UUIDv7 for retry/correlation diagnostics.
    bytes request_id = 3;
}

message UploadContentResponse {
    lore.model.v1.Address address = 1;
    // Actual logical byte count observed by Lore.
    uint64 size = 2;
}

message PutRequest {
    lore.model.v1.Address address = 1;
    lore.model.v1.Fragment fragment = 2;
    optional bytes payload = 3;
}

message PutResponse {
    lore.model.v1.Address address = 1;
}

message QueryRequest {
    repeated lore.model.v1.Address addresses = 1;
}

message QueryResponse {
    repeated lore.model.v1.FragmentState results = 1;
}

message PresignDownloadRequest {
    repeated lore.model.v1.Address addresses = 1;
    uint64 expires_in_seconds = 2;
}

message PresignedDownload {
    lore.model.v1.Address address = 1;
    lore.model.v1.Fragment fragment = 2;
    string url = 3;
    uint64 expires_at_epoch_seconds = 4;
}

message PresignDownloadResponse {
    repeated PresignedDownload downloads = 1;
}

message VerifyRequest {
    lore.model.v1.Address address = 1;
    bool heal = 2;
}

enum HealResult {
    NOT_ATTEMPTED = 0;
    SUCCESS = 1;
    FAILED = 2;
}

message VerifyResponse {
    HealResult healed = 1;
    bool corrupted = 2;
}

message CopyRequest {
    bytes source_repository_id = 1;
    lore.model.v1.Address source_address = 2;
    // Destination context. The destination address is
    // (target_repository, source_address.hash, target_context). When omitted (zero bytes), the
    // server treats the destination context as the source's, preserving legacy semantics.
    bytes target_context = 3;
}

message CopyResponse {
    bytes source_repository_id = 1;
    lore.model.v1.Address source_address = 2;
}

message MutableLoadRequest {
    bytes key = 1;
    uint32 key_type = 2;
}

message MutableLoadResponse {
    bytes value = 1;
}

message MutableStoreRequest {
    bytes key = 1;
    bytes value = 2;
    uint32 key_type = 3;
}

message MutableStoreResponse {}

message MutableCompareAndSwapRequest {
    bytes key = 1;
    bytes expected = 2;
    bytes value = 3;
    uint32 key_type = 4;
}

message MutableCompareAndSwapResponse {
    bytes current_value = 1;
}
